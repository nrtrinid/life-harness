name: agent-guardrails

on:
  pull_request:
  push:

jobs:
  agent-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Agent budget check
        run: npm run check:agent-budget

      - name: Boundary check
        run: npm run check:boundaries

      - name: Agent script claims
        run: npm run check:agent-commands

      - name: Agent ergonomics self-audit
        run: npm run audit:agent-ergonomics
